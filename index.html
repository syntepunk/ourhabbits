<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Our Habits</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    :root { 
      /* Возвращаем чистый AMOLED */
      --bg-color: #000000; 
      --card-bg: #1c1c1e; 
      --text-main: #ffffff; 
      
      /* Цвета TV Girl */
      --blue-active: #9bcad6; 
      --blue-dim: rgba(155, 202, 214, 0.15);
      --pink-active: #efa2b4; 
      --pink-dim: rgba(239, 162, 180, 0.15);
      
      --note-dot: #32d74b; /* Зеленая точка заметок */
    }
    
    * { box-sizing: border-box; }
    
    body { 
      font-family: -apple-system, sans-serif; 
      background-color: var(--bg-color); 
      color: var(--text-main); 
      margin: 0; 
      padding: 20px; 
      padding-top: calc(20px + env(safe-area-inset-top));
      -webkit-user-select: none; 
      padding-bottom: 60px; 
    }
    
    /* Layout: разделение на мобилку и ПК */
    .app-layout { display: flex; gap: 30px; align-items: flex-start; max-width: 1200px; margin: 0 auto; }
    .main-content { flex: 1; min-width: 0; }
    
    /* Календарь скрыт на мобилках */
    .desktop-sidebar { display: none; width: 340px; background: var(--card-bg); border-radius: 18px; padding: 20px; position: sticky; top: 20px; }
    @media (min-width: 1024px) {
      .desktop-sidebar { display: block; }
    }
    
    /* Стили основного контента */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    h1 { font-size: 32px; font-weight: bold; margin: 0; color: #fff; }
    .add-btn { background: #2c2c2e; color: var(--blue-active); border: none; padding: 10px 16px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
    
    .create-form { background: var(--card-bg); border-radius: 18px; padding: 16px; margin-bottom: 20px; display: none; }
    .create-form h3 { margin: 0 0 12px 0; font-size: 18px; color: var(--text-main); }
    .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; color: #8e8e93; }
    .form-group input[type="text"], .form-group select { background: #2c2c2e; border: 1px solid #3a3a3c; color: #fff; padding: 10px; border-radius: 10px; font-size: 15px; }
    .color-picker-wrapper { display: flex; align-items: center; gap: 12px; }
    .form-group input[type="color"] { -webkit-appearance: none; border: none; width: 44px; height: 44px; border-radius: 10px; background: none; cursor: pointer; }
    .form-group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .form-group input[type="color"]::-webkit-color-swatch { border: 1px solid #3a3a3c; border-radius: 10px; }
    .form-buttons { display: flex; gap: 10px; margin-top: 5px; }
    .form-buttons button { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; }
    .save-btn { background: var(--pink-active); color: #000; }
    .cancel-btn { background: #2c2c2e; color: #fff; }

    .legend { font-size: 14px; color: #8e8e93; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    
    .habit-card { background-color: var(--card-bg); border-radius: 18px; padding: 18px; margin-bottom: 20px; }
    .habit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .habit-title { font-size: 18px; font-weight: 600; max-width: 75%; word-wrap: break-word; }
    .delete-btn { background: none; border: none; color: #ff453a; font-size: 13px; padding: 4px; cursor: pointer; opacity: 0.8; }
    
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-cell { background-color: #2c2c2e; border-radius: 10px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; }
    .day-number { font-size: 12px; font-weight: bold; color: #8e8e93; margin-bottom: 6px; }
    
    .dots-container { display: flex; gap: 5px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; cursor: pointer; transition: 0.2s; }
    
    .dot.blue { background-color: var(--blue-dim); }
    .dot.blue.active { background-color: var(--blue-active); box-shadow: 0 0 8px var(--blue-active); }
    
    .dot.pink { background-color: var(--pink-dim); }
    .dot.pink.active { background-color: var(--pink-active); box-shadow: 0 0 8px var(--pink-active); }

    /* Стили Календаря ПК */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 18px; font-weight: bold; }
    .cal-header button { background: #2c2c2e; border: none; color: var(--text-main); cursor: pointer; font-size: 16px; width: 32px; height: 32px; border-radius: 8px; }
    .cal-week-names { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #8e8e93; margin-bottom: 10px; }
    .cal-days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .cal-date-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #2c2c2e; border-radius: 8px; cursor: pointer; position: relative; font-size: 14px; transition: 0.2s; }
    .cal-date-cell:hover { background: #3a3a3c; }
    .cal-date-cell.today { border: 1px solid var(--blue-active); font-weight: bold; }
    .note-indicator { width: 6px; height: 6px; background-color: var(--note-dot); border-radius: 50%; position: absolute; bottom: 5px; box-shadow: 0 0 6px var(--note-dot); }
  </style>
</head>
<body>

  <div class="app-layout">
    
    <div class="main-content">
      <div class="top-bar">
        <h1>Активности</h1>
        <button class="add-btn" onclick="toggleForm(true)">+ Создать</button>
      </div>

      <div id="create-form" class="create-form">
        <h3>Новая активность</h3>
        <div class="form-group">
          <label>Название</label>
          <input type="text" id="habit-title" placeholder="например, Спорт или Питание">
        </div>
        <div class="form-group">
          <label>Количество дней</label>
          <select id="habit-days">
            <option value="31">31 день</option>
            <option value="30">30 дней</option>
          </select>
        </div>
        <div class="form-group">
          <label>Цвет категории (RGB палитра)</label>
          <div class="color-picker-wrapper">
            <input type="color" id="habit-color" value="#efa2b4">
            <span style="font-size: 14px; color: #8e8e93;">Нажми, чтобы настроить цвет</span>
          </div>
        </div>
        <div class="form-buttons">
          <button class="cancel-btn" onclick="toggleForm(false)">Отмена</button>
          <button class="save-btn" onclick="saveHabit()">Сохранить</button>
        </div>
      </div>
      
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background: var(--blue-active)"></div> Илья</div>
        <div class="legend-item"><div class="legend-dot" style="background: var(--pink-active)"></div> Соня</div>
      </div>

      <div id="habits-container"></div>
    </div>

    <div class="desktop-sidebar">
      <div class="cal-header">
        <button onclick="changeMonth(-1)">&#8249;</button>
        <span id="cal-month-year"></span>
        <button onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-week-names">
        <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
      </div>
      <div class="cal-days-grid" id="cal-days"></div>
      <p style="font-size: 12px; color: #8e8e93; margin-top: 20px; text-align: center;">Кликни на день, чтобы добавить заметку</p>
    </div>

  </div>

  <script>
    const firebaseConfig = {
      databaseURL: "https://ourhabbits-4f0f2-default-rtdb.europe-west1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // === ЛОГИКА ТРЕКЕРА ===
    function toggleForm(show) {
      document.getElementById('create-form').style.display = show ? 'block' : 'none';
      if(show) {
        document.getElementById('habit-title').value = '';
        document.getElementById('habit-color').value = '#9bcad6';
      }
    }

    db.ref('habits').on('value', (snapshot) => {
      const habitsData = snapshot.val();
      const container = document.getElementById('habits-container');
      container.innerHTML = '';
      
      if (!habitsData) return;

      Object.keys(habitsData).forEach(id => {
        const habit = habitsData[id];
        const cardColor = habit.color || '#2c2c2e'; 
        
        let cardHtml = `
          <div class="habit-card" style="border-left: 5px solid ${cardColor};">
            <div class="habit-header">
              <div class="habit-title" style="color: ${cardColor};">${habit.title} (${habit.days} дн.)</div>
              <button class="delete-btn" onclick="deleteHabit('${id}')">Удалить</button>
            </div>
            <div class="calendar-grid">
        `;
        
        for(let i = 0; i < habit.days; i++) {
          let u1 = habit.user1_prog[i] === '1';
          let u2 = habit.user2_prog[i] === '1';
          cardHtml += `
            <div class="day-cell">
              <div class="day-number">${i + 1}</div>
              <div class="dots-container">
                <div class="dot blue ${u1 ? 'active' : ''}" onclick="toggleDay('${id}', 'user1', ${i}, '${habit.user1_prog}')"></div>
                <div class="dot pink ${u2 ? 'active' : ''}" onclick="toggleDay('${id}', 'user2', ${i}, '${habit.user2_prog}')"></div>
              </div>
            </div>
          `;
        }
        
        cardHtml += `</div></div>`;
        container.innerHTML += cardHtml;
      });
    });

    function toggleDay(id, userKey, dayIndex, currentProg) {
      let progArray = currentProg.split('');
      progArray[dayIndex] = (progArray[dayIndex] == '0') ? '1' : '0';
      db.ref('habits/' + id).update({ [userKey + '_prog']: progArray.join('') });
    }

    function saveHabit() {
      const title = document.getElementById('habit-title').value.trim();
      const days = parseInt(document.getElementById('habit-days').value);
      const color = document.getElementById('habit-color').value;

      if (!title) return alert("Введите название активности");
      
      db.ref('habits').push().set({
        title: title, days: days, color: color,
        user1_prog: "0".repeat(days), user2_prog: "0".repeat(days)
      });
      toggleForm(false);
    }

    function deleteHabit(id) {
      if(confirm("Точно удалить эту активность?")) db.ref('habits/' + id).remove();
    }

    // === ЛОГИКА КАЛЕНДАРЯ ЗАМЕТОК ===
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let notesData = {};

    db.ref('notes').on('value', (snapshot) => {
      notesData = snapshot.val() || {};
      renderCalendar();
    });

    function renderCalendar() {
      const calDays = document.getElementById('cal-days');
      calDays.innerHTML = '';
      
      const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
      document.getElementById('cal-month-year').innerText = `${monthNames[currentMonth]} ${currentYear}`;

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      let startOffset = firstDay === 0 ? 6 : firstDay - 1; // Пн = 0

      for(let i = 0; i < startOffset; i++) {
        calDays.innerHTML += `<div></div>`;
      }

      const today = new Date();
      for(let d = 1; d <= daysInMonth; d++) {
        let dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        let isToday = (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear());
        let hasNote = notesData[dateStr] ? true : false;

        calDays.innerHTML += `
          <div class="cal-date-cell ${isToday ? 'today' : ''}" onclick="handleNoteClick('${dateStr}')">
            ${d}
            ${hasNote ? '<div class="note-indicator"></div>' : ''}
          </div>
        `;
      }
    }

    function changeMonth(dir) {
      currentMonth += dir;
      if(currentMonth > 11) { currentMonth = 0; currentYear++; }
      if(currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
    }

    function handleNoteClick(dateStr) {
      let existingNote = notesData[dateStr] || '';
      let text = prompt(`Заметка на ${dateStr}:\n(Оставь пустым и нажми ОК, чтобы удалить)`, existingNote);
      
      if(text !== null) {
        if(text.trim() === '') {
          db.ref('notes/' + dateStr).remove();
        } else {
          db.ref('notes/' + dateStr).set(text.trim());
        }
      }
    }

  </script>
</body>
</html>
