<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Our Habits</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    :root { 
      --bg-color: #000; 
      --card-bg: #1c1c1e; 
      --text-main: #fff; 
      --blue-active: #0a84ff;
      --blue-dim: rgba(10, 132, 255, 0.12);
      --pink-active: #ff2d55;
      --pink-dim: rgba(255, 45, 85, 0.12);
    }
    body { 
      font-family: -apple-system, sans-serif; 
      background-color: var(--bg-color); 
      color: var(--text-main); 
      margin: 0; 
      padding: 20px; 
      padding-top: calc(20px + env(safe-area-inset-top));
      -webkit-user-select: none; 
      padding-bottom: 60px; 
    }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    h1 { font-size: 32px; font-weight: bold; margin: 0; }
    .add-btn { background: #2c2c2e; color: var(--blue-active); border: none; padding: 10px 16px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
    
    .legend { font-size: 14px; color: #8e8e93; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    
    .habit-card { background-color: var(--card-bg); border-radius: 18px; padding: 18px; margin-bottom: 20px; }
    .habit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .habit-title { font-size: 18px; font-weight: 600; max-width: 75%; word-wrap: break-word; }
    .delete-btn { background: none; border: none; color: #ff453a; font-size: 13px; padding: 4px; cursor: pointer; }
    
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-cell { background-color: #2c2c2e; border-radius: 10px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; }
    .day-number { font-size: 12px; font-weight: bold; color: #8e8e93; margin-bottom: 6px; }
    
    .dots-container { display: flex; gap: 5px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; cursor: pointer; transition: 0.2s; }
    
    .dot.blue { background-color: var(--blue-dim); border: 1px solid rgba(10, 132, 255, 0.3); }
    .dot.blue.active { background-color: var(--blue-active); box-shadow: 0 0 8px var(--blue-active); border: none; }
    
    .dot.pink { background-color: var(--pink-dim); border: 1px solid rgba(255, 45, 85, 0.3); }
    .dot.pink.active { background-color: var(--pink-active); box-shadow: 0 0 8px var(--pink-active); border: none; }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>Активности</h1>
    <button class="add-btn" onclick="addHabit()">+ Создать</button>
  </div>
  
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background: var(--blue-active)"></div> Илья</div>
    <div class="legend-item"><div class="legend-dot" style="background: var(--pink-active)"></div> Девушка</div>
  </div>

  <div id="habits-container"></div>

  <script>
    // === НАСТРОЙКА FB ===
    const firebaseConfig = {
      databaseURL: "ВСТАВЬ_СЮДА_СВОЮ_ССЫЛКУ_ИЗ_FIREBASE"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Слушаем изменения в базе данных (работает в реальном времени)
    db.ref('habits').on('value', (snapshot) => {
      const habitsData = snapshot.val();
      const container = document.getElementById('habits-container');
      container.innerHTML = '';
      
      if (!habitsData) return;

      Object.keys(habitsData).forEach(id => {
        const habit = habitsData[id];
        let cardHtml = `
          <div class="habit-card">
            <div class="habit-header">
              <div class="habit-title">${habit.title} (${habit.days} дн.)</div>
              <button class="delete-btn" onclick="deleteHabit('${id}')">Удалить</button>
            </div>
            <div class="calendar-grid">
        `;
        
        for(let i = 0; i < habit.days; i++) {
          let u1 = habit.user1_prog[i] === '1';
          let u2 = habit.user2_prog[i] === '1';
          cardHtml += `
            <div class="day-cell">
              <div class="day-number">${i + 1}</div>
              <div class="dots-container">
                <div class="dot blue ${u1 ? 'active' : ''}" onclick="toggleDay('${id}', 'user1', ${i}, '${habit.user1_prog}')"></div>
                <div class="dot pink ${u2 ? 'active' : ''}" onclick="toggleDay('${id}', 'user2', ${i}, '${habit.user2_prog}')"></div>
              </div>
            </div>
          `;
        }
        
        cardHtml += `</div></div>`;
        container.innerHTML += cardHtml;
      });
    });

    function toggleDay(id, userKey, dayIndex, currentProg) {
      let progArray = currentProg.split('');
      progArray[dayIndex] = (progArray[dayIndex] == '0') ? '1' : '0';
      let newProg = progArray.join('');
      
      db.ref('habits/' + id).update({
        [userKey + '_prog']: newProg
      });
    }

    function addHabit() {
      const title = prompt("Название новой активности:");
      if (!title) return;
      let days = prompt("Количество дней (30 или 31)?", "31");
      if (days !== "30" && days !== "31") days = "31";
      
      let emptyProg = "0".repeat(parseInt(days));
      const newHabitRef = db.ref('habits').push();
      
      newHabitRef.set({
        title: title,
        days: parseInt(days),
        user1_prog: emptyProg,
        user2_prog: emptyProg
      });
    }

    function deleteHabit(id) {
      if(confirm("Точно удалить эту активность?")) {
        db.ref('habits/' + id).remove();
      }
    }
  </script>
</body>
</html>
